<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Botana Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #08060a;
            --text-color: #f0f0f0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #ff2d55;
            --accent-glow: rgba(255, 45, 85, 0.6);
            --bot-bubble: rgba(20, 15, 25, 0.95);
            --user-bubble: linear-gradient(135deg, #ff2d55, #8e2de2);
            --header-h: 80px; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Quicksand', sans-serif;
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .neon-sphere {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent-glow);
            filter: blur(100px);
            z-index: -1;
            animation: moveLights 20s infinite alternate linear;
        }
        .sphere-2 { background: rgba(142, 45, 226, 0.3); right: -20px; bottom: -20px; }

        @keyframes moveLights {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        .app-container {
            width: 100%;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            animation: fadeIn 0.8s ease;
            position: relative;
        }

        @media (min-width: 768px) {
            .app-container {
                width: 1000px;
                height: 85vh;
                border-radius: 40px;
                border: 1px solid var(--glass-border);
                box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            }
        }

        .header {
            height: var(--header-h);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .avatar-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(45deg, var(--accent-color), #8e2de2);
            box-shadow: 0 0 15px var(--accent-glow);
            margin-bottom: 5px;
        }

        .avatar-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .header h1 {
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color);
        }

        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }
        #chat-window::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap; 
            animation: msgPop 0.3s ease-out forwards;
        }

        .bot { align-self: flex-start; background: var(--bot-bubble); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; color: #fff; }

        @keyframes msgPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .input-area {
            min-height: 70px;
            padding: 12px 15px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            padding: 12px 18px;
            border-radius: 22px;
            color: #fff;
            outline: none;
            font-size: 16px;
            touch-action: manipulation;
            font-family: inherit;
            resize: none;
            max-height: 150px;
            overflow-y: auto;
            transition: border 0.3s;
            line-height: 1.2;
            scrollbar-width: none;
        }
        textarea::-webkit-scrollbar { display: none; }
        textarea:focus { border-color: var(--accent-color); }

        /* ESTILO DEL BOTÓN DE LIMPIAR */
        .clear-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .clear-btn:hover {
            background: rgba(255, 45, 85, 0.2);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .clear-btn:active {
            transform: scale(0.9);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--accent-color);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
            flex-shrink: 0;
            margin-bottom: 2px;
            transition: transform 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="neon-sphere"></div>
    <div class="neon-sphere sphere-2"></div>

    <div class="app-container">
        <header class="header">
            <div class="avatar-circle">
                <img src="botana.webp" alt="Botana">
            </div>
            <h1>Botana</h1>
        </header>

        <div id="chat-window"></div>

        <footer class="input-area">
            <button class="clear-btn" onclick="limpiarMemoria()" title="Borrar memoria">🗑️</button>
            <textarea id="userInput" placeholder="Escribile algo..." autocomplete="off" rows="1"></textarea>
            <button class="send-btn" onclick="enviar()">➜</button>
        </footer>
    </div>

    <script>
        // SID dinámico para manejar sesiones
        const sid = localStorage.getItem('botana_sid') || ('web-' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem('botana_sid', sid);

        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('userInput');

        // Función para limpiar memoria
        function limpiarMemoria() {
            if (confirm("¿Querés reiniciar la memoria de Botana?")) {
                localStorage.removeItem('botana_sid'); // Borramos el ID local
                location.reload(); // Recargamos para generar un ID limpio
            }
        }

        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                enviar();
            }
        });

        async function enviar() {
            const mensaje = input.value.trim();
            if (!mensaje) return;

            appendMsg(mensaje, 'user');
            input.value = '';
            input.style.height = 'auto';
            
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje, sessionId: sid })
                });
                const data = await res.json();
                appendMsg(data.respuesta, 'bot');
            } catch (e) {
                appendMsg('Error de conexión. Inténtalo de nuevo.', 'bot');
            }
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.textContent = text;
            chatWindow.appendChild(div);
            
            chatWindow.scrollTo({
                top: chatWindow.scrollHeight,
                behavior: 'smooth'
            });
        }

        window.visualViewport.addEventListener('resize', () => {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    </script>
    <script src="script.js">
        // Bloqueo total de zoom por gestos
document.addEventListener('touchstart', (e) => {
    if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

document.addEventListener('gesturestart', (e) => {
    e.preventDefault();
});
    </script>
</body>
</html>
